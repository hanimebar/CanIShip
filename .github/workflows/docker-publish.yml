name: Publish Docker Image

on:
  push:
    branches: [main]
    paths:
      # Only rebuild when something that affects the image changes
      - 'app/**'
      - 'lib/**'
      - 'components/**'
      - 'public/**'
      - 'Dockerfile.selfhosted'
      - 'docker-entrypoint.sh'
      - 'package.json'
      - 'package-lock.json'
      - 'next.config.mjs'
      - 'tsconfig.json'
  # Also allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build & push caniship/caniship
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version $VERSION"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.selfhosted
          push: true
          # Tag as both the exact version and latest
          tags: |
            caniship/caniship:latest
            caniship/caniship:${{ steps.version.outputs.version }}
          # Cache layers between builds to keep push time fast
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Build args
          build-args: |
            NODE_VERSION=20

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: caniship/caniship
          short-description: CanIShip self-hosted — AI-powered app QA for solo builders
          readme-filepath: ./DOCKER.md
